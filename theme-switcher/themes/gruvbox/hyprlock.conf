general {
    hide_cursor = true
    grace = 2
    immediate_render = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 1.0
    brightness = 0.85
    vibrancy = 0.15
    vibrancy_darkness = 0.0
}

shape {
    monitor =
    size = 420, 220
    color = rgba(1d2021cc)
    rounding = 18
    border_size = 2
    border_color = rgba(98971aff)
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%I:%M')"
    color = rgba(ebdbb2ff)
    font_size = 40
    font_family = JetBrainsMono Nerd Font
    position = 0, 60
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A, %d %B %Y')"
    color = rgba(a89984ff)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 10
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 52
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.18
    dots_center = true
    outer_color = rgba(98971aff)
    inner_color = rgba(282828ee)
    font_color = rgba(ebdbb2ff)
    fade_on_empty = false
    rounding = 12
    check_color = rgba(98971aff)
    fail_color = rgba(cc241dff)
    placeholder_text = <span foreground="##a89984">Password...</span>
    position = 0, -45
    halign = center
    valign = center
}

label {
    monitor =
    text = Type to unlock
    color = rgba(a89984ff)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -95
    halign = center
    valign = center
}
