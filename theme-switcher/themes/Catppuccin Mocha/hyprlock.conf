general {
    hide_cursor = true
    grace = 2
    immediate_render = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 1.0
    brightness = 0.85
    vibrancy = 0.15
    vibrancy_darkness = 0.0
}

shape {
    monitor =
    size = 420, 220
    color = rgba(1e1e2ecc)
    rounding = 18
    border_size = 2
    border_color = rgba(cba6f7ff)
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%I:%M')"
    color = rgba(cdd6f4ff)
    font_size = 40
    font_family = JetBrainsMono Nerd Font
    position = 0, 60
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A, %d %B %Y')"
    color = rgba(bac2deff)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 10
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 52
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.18
    dots_center = true
    outer_color = rgba(cba6f7ff)
    inner_color = rgba(313244ee)
    font_color = rgba(cdd6f4ff)
    fade_on_empty = false
    rounding = 12
    check_color = rgba(cba6f7ff)
    fail_color = rgba(f38ba8ff)
    placeholder_text = <span foreground="##bac2de">Password...</span>
    position = 0, -45
    halign = center
    valign = center
}

label {
    monitor =
    text = Type to unlock
    color = rgba(bac2deff)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -95
    halign = center
    valign = center
}
