#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 10
    gaps_out = 20
    border_size = 1

    col.active_border = rgb(cba6f7)
    col.inactive_border = rgb(313244)
    

    resize_on_border = true
    allow_tearing = true
    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 10

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(11111bdd)
    }

    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        noise = 0.01
        contrast = 0.95
        brightness = 0.90
        vibrancy = 0.15
    }
}