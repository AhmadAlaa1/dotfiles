
###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
# bind = $mainMod, M, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle 
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod, T, togglefloating,
bind = SUPER_CTRL, RETURN, exec, $menu
# bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, R, exec, ~/.config/waybar/scripts/launch.sh
bind = , XF86Calculator, exec, gnome-calculator

bind = CTRL SUPER, F, fullscreen, 1
bind = $mainMod, F, fullscreenstate, 2 2
bind = $mainMod, Z, exec, code
bind = $mainMod, C, exec, flatpak run com.discordapp.Discord
bind = $mainMod, P, exec, pkill wlogout || wlogout

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Swap with window in direction
bind = $mainMod SHIFT, left, swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, up, swapwindow, u
bind = $mainMod SHIFT, down, swapwindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

#move all windows to another workspace
bind = SUPER_CTRL, 1, exec, ~/.config/hypr/scripts/move-all-to-workspace.sh 1
bind = SUPER_CTRL, 2, exec, ~/.config/hypr/scripts/move-all-to-workspace.sh 2
bind = SUPER_CTRL, 3, exec, ~/.config/hypr/scripts/move-all-to-workspace.sh 3
bind = SUPER_CTRL, 4, exec, ~/.config/hypr/scripts/move-all-to-workspace.sh 4
bind = SUPER_CTRL, 5, exec, ~/.config/hypr/scripts/move-all-to-workspace.sh 5
bind = SUPER_CTRL, 6, exec, ~/.config/hypr/scripts/move-all-to-workspace.sh 6
bind = SUPER_CTRL, 7, exec, ~/.config/hypr/scripts/move-all-to-workspace.sh 7
bind = SUPER_CTRL, 8, exec, ~/.config/hypr/scripts/move-all-to-workspace.sh 8
bind = SUPER_CTRL, 9, exec, ~/.config/hypr/scripts/move-all-to-workspace.sh 9

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
# bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
# bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
# bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
# bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
# bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# SwayOSD Volume
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindl  = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle

#SwayOSD Mic
bind = $mainMod, M, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle && notify-send -t 2000 "Microphone" "$(wpctl get-volume @DEFAULT_AUDIO_SOURCE@ | grep -q MUTED && echo Muted || echo Unmuted)"

# SwayOSD Brightness
bindel = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

#clipboard
bind = SUPER, V, exec, cliphist list | rofi -dmenu -display-columns 2 -p "Clipboard" -theme ~/.config/rofi/current-theme.rasi| cliphist decode | wl-copy

#screenshots
bind = $mainMod, F10, exec, hyprshot -m output -m eDP-1
bind = $mainMod_SHIFT, F10, exec, hyprshot -m region
bind = $mainMod_CTRL , F10, exec, hyprshot -m region --clipboard-only

#back and forth
binds {
    workspace_back_and_forth = true
}

#swaync notification center
bind = $mainMod, N, exec,swaync-client -t

#Keyboard layout Notification
bind = $mainMod, SPACE, exec, ~/.config/hypr/scripts/kb-layout-notify.sh

#Theme Switcher
bind = SUPER, O, exec, ~/.config/theme-switcher/switch-theme.sh 
